services:
  db:
    image: postgres:15-alpine
    container_name: smartstore_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartstore_pass}
      POSTGRES_DB: ${POSTGRES_DB:-smartstore}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartstore}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: smartstore_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smartstore}:${POSTGRES_PASSWORD:-smartstore_pass}@db:5432/${POSTGRES_DB:-smartstore}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: smartstore_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data:
